<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Добавить товар</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
    background: linear-gradient(135deg,#1e293b,#0f172a);
    color:white;
}

.container{
    max-width:500px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:25px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:14px;
}

input::placeholder{
    color:#94a3b8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#6366f1;
    color:white;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#4f46e5;
    transform:scale(1.02);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

a{
    color:#cbd5f5;
    text-decoration:none;
    font-size:14px;
}

a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <a href="/products">← Назад</a>
        <a href="/admin_panel">Админка</a>
    </div>

    <h1>Добавить товар</h1>

    <form action="/add_product" method="post">

        <input type="text" name="name" placeholder="Название товара" required>

        <input type="number" step="0.01" name="price" placeholder="Цена" required>

        <input type="number" name="count" placeholder="Количество" required>

        <input type="text" name="category" placeholder="Категория" required>

        <input type="text" name="img_url" placeholder="Ссылка на картинку">

        <button type="submit">Добавить товар 🚀</button>

    </form>

</div>

</body>
</html>
