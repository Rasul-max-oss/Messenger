<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --price-color: #10b981;
            --cart-btn: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--price-color);
        }

        .count {
            font-size: 0.875rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* Кнопка корзины */
        .cart-form {
            margin-top: auto;
        }

        .cart-btn {
            width: 100%;
            background-color: var(--cart-btn);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .cart-btn:hover {
            background-color: #334155;
            transform: scale(1.02);
        }

        .cart-btn:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin: 0; font-size: 24px; color: #1e293b;">Каталог товаров</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
        <a href="/cart_page" style="text-decoration: none; color: #1e293b; font-weight: 500;">🛒 Корзина</a>
        <a href="/profile" style="text-decoration: none; color: #64748b; padding: 10px; font-weight: 500;">Профиль</a>
        <a href="/add_product_page" style="
            background: #6366f1;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);">
            + Товар
        </a>
    </div>
</header>

<div class="container">
    <div class="products-grid">
        {% if products %}
            {% for product in products %}
            <div class="product-card">
                <div class="image-container">
                    <img src="{{ product.img_url }}" alt="{{ product.name }}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                </div>
                <div class="content">
                    <span class="category">{{ product.category }}</span>
                    <h3 class="product-name">{{ product.name }}</h3>

                    <div class="info-row">
                        <span class="price">{{ product.price }} ₽</span>
                        <span class="count">🛒 {{ product.count }} шт.</span>
                    </div>

                    <form action="/add_to_cart" method="post" class="cart-form">
                        <input type="hidden" name="product_id" value="{{ product.id }}">
                        <button type="submit" class="cart-btn">
                            Добавить в корзину
                        </button>
                    </form>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <h2>Товаров пока нет</h2>
                <p>Будьте первым, кто добавит продукт в базу данных.</p>
            </div>
        {% endif %}
    </div>
</div>

</body>
</html>
