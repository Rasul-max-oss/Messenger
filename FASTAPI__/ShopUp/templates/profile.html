<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* Навигация сверху */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px; /* Добавил отступ между кнопками */
            padding: 20px 0;
            z-index: 100;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Выделение кнопки корзины */
        .nav-btn.cart-link {
            background: rgba(16, 185, 129, 0.2); /* Зеленоватый оттенок */
        }

        .nav-btn:hover {
            background: white;
            color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 80px;
        }

        .profile-card::before {
            content: "";
            position: absolute; top: 0; left: 0;
            width: 100%; height: 8px;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .avatar {
            width: 80px; height: 80px;
            background: #f0f2f5;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #764ba2; border: 3px solid #eee;
        }

        h2 { margin: 10px 0; font-size: 24px; color: #2d3436; }
        .welcome-text { font-size: 18px; margin-bottom: 25px; color: #636e72; }
        .user-info { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 30px; border: 1px dashed #d1d8e0; }
        .user-info p { margin: 5px 0; font-size: 14px; color: #7f8c8d; }
        .user-info b { color: #2d3436; }

        .action-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .logout-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover { background-color: #ff6b81; transform: translateY(-2px); }

        /* Ссылка на корзину внутри карточки */
        .cart-btn-profile {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="/products" class="nav-btn">📦 Каталог</a>
    <a href="/cart_page" class="nav-btn cart-link">🛒 Моя корзина</a>
    <a href="/add_product_page" class="nav-btn">➕ Добавить продукт</a>
</div>

<div class="profile-card">
    <div class="avatar">👤</div>
    <h2>Профиль пользователя</h2>
    <p class="welcome-text">Привет, <b>{{ user.username }}</b>!</p>

    <div class="user-info">
        <p>Ваш уникальный идентификатор:</p>
        <p><b>ID: {{ user.id }}</b></p>
    </div>

    <div class="action-links">
        <a href="/cart_page" class="cart-btn-profile">Проверить товары в корзине →</a>
        <a href="/logout" class="logout-btn">Выйти из системы</a>
    </div>
</div>

</body>
</html>
