<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        /* Общие настройки страницы */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }

        /* Контейнер формы */
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #4a4a4a;
        }

        /* Стили полей ввода */
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            display: inline-block;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
            transition: 0.3s;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.2);
        }

        /* Кнопка */
        button {
            width: 100%;
            background-color: #764ba2;
            color: white;
            padding: 14px 20px;
            margin: 20px 0 15px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #5a3782;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Ссылка внизу */
        a {
            text-decoration: none;
            color: #764ba2;
            font-size: 13px;
            transition: 0.2s;
        }

        a:hover {
            color: #5a3782;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <form action="/register" method="post">
        <h2>Создать аккаунт</h2>

        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>

        <button type="submit">Зарегистрироваться</button>
    </form>

    <a href="/login_page">Уже есть аккаунт? Войти</a>
</div>

</body>
</html>
