<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль {{ user.username }}</title>
    <style>
        .profile-card {
            max-width: 350px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 15px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #007bff;
        }

        .user-description {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
            padding: 0 10px;
            font-style: italic;
            line-height: 1.4;
            word-wrap: break-word; /* Чтобы длинные слова не вылезали за края */
        }

        .username {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 15px 0 5px 0;
        }

        .user-number {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            text-decoration: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="{{ user.avatar }}" alt="Avatar" class="avatar">

        {% if user.description %}
            <div class="user-description">
                {{ user.description }}
            </div>
        {% else %}
            <div class="user-description">Описание не заполнено</div>
        {% endif %}

        <div class="username">{{ user.username }}</div>
        <div class="user-number">@{{ user.number }}</div>

        <hr>

        <div style="margin-top: 15px;">
            <a href="/chats" class="btn">Сообщения</a>
            <a href="/settings_page" class="btn" style="background-color: #6c757d;">Настройки</a>
            <br>
            <a href="/logout" style="color: #dc3545; font-size: 0.8rem; display: block; margin-top: 10px;">Выйти из аккаунта</a>
        </div>
    </div>

</body>
</html>
