<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с {{ opponent.username }}</title>
    <style>
        body { font-family: sans-serif; background: #e6ddd3; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; }
        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { max-width: 70%; padding: 10px; margin-bottom: 10px; border-radius: 10px; position: relative; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .their-msg { align-self: flex-start; background: white; }
        .input-area { background: #f0f0f0; padding: 15px; display: flex; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <strong>{{ opponent.username }}</strong>
    </div>

    <div class="chat-window">
        {% for msg in messages %}
            <div class="message {% if msg.sender_id == current_user_id %}my-msg{% else %}their-msg{% endif %}">
                {{ msg.text }}
                <div style="font-size: 10px; text-align: right; color: gray;">{{ msg.timestamp }}</div>
            </div>
        {% endfor %}
    </div>

    <form class="input-area" action="/send_message/{{ chat_id }}" method="post">
        <input type="text" name="text" placeholder="Введите сообщение..." required>
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
