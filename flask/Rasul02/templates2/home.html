<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная | La Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            background-color: #fefaf6;
            color: #3e3e3e;
            text-align: center;
        }

        header {
            background-color: #f4ede4;
            padding: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            color: #5a3e36;
            margin: 0;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #8b5e3c;
            font-weight: bold;
            font-size: 18px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #5a3e36;
        }

        .content {
            padding: 40px 20px;
        }

        .content img {
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 90%;
            height: auto;
        }

        .content p {
            font-size: 20px;
            margin-top: 20px;
        }

        .buttons a {
            display: inline-block;
            margin: 20px 10px;
            padding: 12px 24px;
            text-decoration: none;
            background-color: #e7d8c9;
            color: #5a3e36;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .buttons a:hover {
            background-color: #d5c2b1;
        }
    </style>
</head>
<body>

<header>
    <h1>☕ La Café</h1>
    <nav>
        <a href="/">🏠 Главная</a>
        <a href="/menu">📖 Меню</a>
        <a href="/contact">📞 Контакты</a>
    </nav>
</header>

<div class="content">
    <h2>Добро пожаловать в кофейню "Ла Кофе"</h2>
    <p>Мы — уютная семейная кофейня в самом сердце города. Здесь вы найдёте атмосферу Парижа, ароматный кофе и тёплый приём.</p>
    <img src="https://www.dubaiparksandresorts.com/sites/default/files/2024-11/DSC09435%201.JPG" alt="Кофейня La Café" width="600">

    <div class="buttons">
        <a href="/menu">📖 Посмотреть меню</a>
        <a href="/about">🧐 Узнать о нас</a>
        <a href="/contact">📞 Связаться с нами</a>
    </div>
</div>

</body>
</html>
