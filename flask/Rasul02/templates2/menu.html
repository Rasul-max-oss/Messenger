<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню Кафе</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background-color: #fdfaf6;
            color: #3e3e3e;
            text-align: center;
            padding: 40px;
            margin: 0;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            color: #5a3e36;
            margin-bottom: 10px;
        }

        .menu-item {
            border: 1px solid #e0dcd5;
            border-radius: 10px;
            background-color: #fffaf4;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .menu-item:hover {
            transform: scale(1.03);
        }

        .menu-item img {
            border-radius: 8px;
            margin-top: 10px;
        }

        p {
            font-size: 16px;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: #8b5e3c;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #d2b48c;
            padding: 10px 20px;
            border-radius: 6px;
            background-color: #f4ede4;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #e2d4c2;
        }
    </style>
</head>
<body>

    <h1>📖 Меню Кафе</h1>

    <div class="menu-item">
        <h2>☕ Эспрессо</h2>
        <p>Крепкий и насыщенный. <strong>150₽</strong></p>
        <img src="https://www.thespruceeats.com/thmb/HJrjMfXdLGHbgMhnM0fMkDx9XPQ=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/what-is-espresso-765702-hero-03_cropped-ffbc0c7cf45a46ff846843040c8f370c.jpg" alt="Эспрессо" width="250">
    </div>

    <div class="menu-item">
        <h2>🥛 Капучино</h2>
        <p>С нежной молочной пенкой. <strong>220₽</strong></p>
        <img src="https://lorcoffee.com/cdn/shop/articles/Cappuccino-exc.jpg?v=1684870907" alt="Капучино" width="250">
    </div>

    <div class="menu-item">
        <h2>🍯 Латте</h2>
        <p>Наш бестселлер с ванильным сиропом. <strong>250₽</strong></p>
        <img src="https://www.caffesociety.co.uk/assets/recipe-images/latte-small.jpg" alt="Латте" width="250">
    </div>

    <div class="menu-item">
        <h2>🌿 Американо</h2>
        <p>Легкий и освежающий. <strong>186₽</strong></p>
        <img src="https://beerloga.menu/assets/img/menu/67ce0f26ba50d.jpeg" alt="Американо" width="250">
    </div>

    <a href="/">🏠 На главную</a>

</body>
</html>
