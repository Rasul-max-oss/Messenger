<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список машин</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h1.title {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button[type="submit"] {
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #218838;
        }

        .car-card {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            background-color: #fafafa;
        }

        .car-card p {
            margin: 6px 0;
        }

        .empty {
            text-align: center;
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Добавить Машину</h1>

        <form method="POST" action="{{ url_for('add_cars') }}">
            <input type="text" name="brand" placeholder="Марка" required>
            <input type="text" name="model" placeholder="Модель" required>
            <input type="text" name="color" placeholder="Цвет" required>
            <input type="text" name="price" placeholder="Цена" required>
            <button type="submit">Отправить</button>
        </form>

        {% if cars %}
            <h1 class="title">Список Машин</h1>
            {% for car in cars %}
                <div class="car-card">
                    <p><strong>Марка:</strong> {{ car.brand }}</p>
                    <p><strong>Модель:</strong> {{ car.model }}</p>
                    <p><strong>Цвет:</strong> {{ car.color }}</p>
                    <p><strong>Цена:</strong> {{ car.price }} руб.</p>
                </div>
            {% endfor %}
        {% else %}
            <p class="empty">Нету машин, добавьте машину</p>
        {% endif %}
    </div>
</body>
</html>
