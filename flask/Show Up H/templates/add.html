<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Add order</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: #333;
        }

        form {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: 600;
            color: #444;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #0a84ff;
            outline: none;
        }

        button {
            background-color: #0a84ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #006edc;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .links a {
            text-decoration: none;
            color: #0a84ff;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .links a:hover {
            background-color: #0a84ff;
            color: white;
        }

        .flash-messages {
            max-width: 500px;
            margin: 20px auto;
            background-color: #ffe9a8;
            padding: 10px 15px;
            border-left: 5px solid #ffca3a;
            border-radius: 8px;
            color: #5a4a00;
            font-weight: 600;
        }
    </style>
</head>
<body>

{% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-messages">
                {% for msg in messages %}
                    <div>{{ msg }}</div>
                {% endfor %}
            </div>
        {% endif %}
{% endwith %}

<h2>Добавить товар</h2>
<form method="POST">
  <label for="name">Название</label>
  <input type="text" id="name" name="name" required>

  <label for="ram">Рам</label>
  <input type="text" id="ram" name="ram">

  <label for="processor">Процессор</label>
  <input type="text" id="processor" name="processor">

  <label for="video_card">Видео-карта</label>
  <input type="text" id="video_card" name="video_card">

  <label for="ssd">ССД</label>
  <input type="text" id="ssd" name="ssd">

  <label for="price">Цена (₽)</label>
  <input type="number" id="price" step="0.01" name="price" min="0.01">

  <label for="img">Ссылка на изображение</label>
  <input type="url" id="img" name="img" placeholder="https://example.com/image.jpg">

  <button type="submit">Добавить</button>
</form>

<div class="links">
  <a href="{{ url_for('show_computers') }}">На главную</a>
  <a href="{{ url_for('admin_logout') }}">Выйти из админки</a>
</div>

</body>
</html>
