<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <style>
        /* Общий фон с мягким градиентом */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: linear-gradient(to bottom, #ffeef8, #ffe0f0);
            overflow-x: hidden;
            position: relative;
            height: 100vh;
        }

        h1 {
            color: #b30059;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        input {
            margin: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background-color: #e75480;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c94c74;
        }

        p {
            text-align: center;
            color: #555;
        }

        /* Падающие лепестки */
        .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 10px 10px, #ffb6c1 30%, transparent 70%);
            border-radius: 50%;
            animation: fall 10s linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<h1>🌸 Управление пользователями</h1>

<form method="POST" action="{{ url_for('add_user') }}">
    <input type="text" name="name" placeholder="Имя" required>
    <input type="text" name="email" placeholder="Email" required>
    <button type="submit">Добавить</button>
</form>

{% for user in users %}
    <h1>{{ user.name }}</h1>
    <h1>{{ user.email }}</h1>
{% else %}
    <p>Нет пользователей. Добавьте первого!</p>
{% endfor %}

<!-- Генерация лепестков сакуры -->
<script>
    const numPetals = 20;

    for (let i = 0; i < numPetals; i++) {
        let petal = document.createElement("div");
        petal.classList.add("petal");
        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDelay = Math.random() * 10 + "s";
        petal.style.animationDuration = 5 + Math.random() * 5 + "s";
        document.body.appendChild(petal);
    }
</script>

</body>
</html>
