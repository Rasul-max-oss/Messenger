<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Матрешка РП</title>

    <style>
        /* ФОН + ОБЩИЙ СТИЛЬ */
        body {
            font-family: "Montserrat", "Segoe UI", sans-serif;
            background: #0b0b0d url('https://i.imgur.com/7LSzCwW.png') repeat;
            color: #d6d6d6;
            margin: 0;
            padding: 0;
        }

        /* КОНТЕЙНЕР */
        .container {
            max-width: 450px;
            margin: 80px auto;
            padding: 35px 40px;
            background: rgba(15, 15, 15, 0.92);
            border-radius: 14px;
            border: 1px solid rgba(255, 0, 0, 0.25);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.25);
        }

        /* ЗАГОЛОВОК */
        h2 {
            margin: 0 0 25px;
            font-size: 28px;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
            font-weight: 700;
        }

        /* ЛЕЙБЛЫ */
        label {
            font-size: 14px;
            font-weight: 600;
            color: #e3e3e3;
        }

        /* ПОЛЯ ВВОДА */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            font-size: 15px;
            color: #fff;

            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 60, 60, 0.25);
            border-radius: 10px;

            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ff4d4d;
            background: rgba(40, 40, 40, 1);
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        /* КНОПКА */
        button {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            font-size: 17px;
            font-weight: 600;

            background: #ff4d4d;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;

            transition: 0.2s;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        button:hover {
            background: #ff1f1f;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
        }

        /* FLASH-СООБЩЕНИЯ */
        .messages {
            padding: 12px 15px;
            margin-bottom: 20px;

            border-radius: 10px;
            background: rgba(255,20,20,0.08);
            border: 1px solid rgba(255,40,40,0.35);

            color: #ff6b6b;
            list-style: square;
        }

        /* НИЖНЯЯ ССЫЛКА */
        .bottom-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

        a {
            color: #ff4d4d;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            text-shadow: 0 0 6px rgba(255,0,0,0.5);
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Вход в аккаунт</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="messages">
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
        <label>Имя пользователя:<br>
            <input type="text" name="username" required>
        </label><br><br>

        <label>Пароль:<br>
            <input type="password" name="password" required>
        </label>

        <button type="submit">Войти</button>
    </form>

    <p class="bottom-link">
        <a href="{{ url_for('register') }}">Нет аккаунта? Зарегистрироваться</a>
    </p>

</div>

</body>
</html>
