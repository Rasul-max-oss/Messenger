<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой мир фильмов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Фоновый текст "Голливуд" */
        .background-text {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 160px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.05);
            transform: translate(-50%, -50%) rotate(-15deg);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            animation: slideFade 1s ease-in-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            animation: fadeInDown 1s ease;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeInUp 1s ease;
        }

        input {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #42a5f5;
            transform: scale(1.02);
        }

        button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #42a5f5;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: #1e88e5;
            transform: scale(1.05);
        }

        a {
            text-align: center;
            display: block;
            margin-top: 20px;
            color: #90caf9;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        a:hover {
            color: #ffffff;
        }

        /* Анимации */
        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="background-text">Голливуд</div>

<div class="container">
    <h1>Мир фильмов</h1>

    <form method="POST">
        <input type="text" name="film" placeholder="Название фильма" required>
        <input type="text" name="director" placeholder="Жанр" required>
        <input type="number" name="year" placeholder="Дата выхода" required min="1800">
        <input type="number" step="0.1" name="rating" placeholder="Оценка (0-10)" required min="0" max="10">

        <button type="submit">🎬 Отправить</button>

        <a href="/movies">📽️ Посмотреть свой список фильмов</a>
    </form>
</div>

</body>
</html>
