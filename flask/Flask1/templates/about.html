<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eaf1fb, #f4f8fc);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
            color: #333;
        }

        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 460px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .form-container:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            background-color: #f5f8fa;
            font-size: 16px;
            transition: border 0.2s ease, background-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: #0067c5;
            background-color: #fff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #0067c5;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0053a0;
        }

        .result-card {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .result-card h1 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #222;
        }

        .result-card h1:last-child {
            margin-top: 20px;
            font-weight: normal;
            color: #0078d4;
        }

        @media (max-width: 480px) {
            .form-container, .result-card {
                padding: 30px 20px;
            }

            input[type="text"], button {
                font-size: 14px;
                padding: 12px;
            }

            .result-card h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <form method="POST">
            <input type="text" name="username" placeholder="Введите имя">
            <input type="text" name="age" placeholder="Введите возраст">
            <input type="text" name="hobby" placeholder="Введите хобби">
            <input type="text" name="city" placeholder="Введите город">
            <input type="text" name="game" placeholder="Введите игру">
            <button type="submit">Отправить</button>
        </form>
    </div>

    {% if name and age and hobby and city and game %}
    <div class="result-card">
        <h1>Имя: {{name}}</h1>
        <h1>Возраст: {{age}}</h1>
        <h1>Хобби: {{hobby}}</h1>
        <h1>Город: {{city}}</h1>
        <h1>Игра: {{game}}</h1>
        <h1>{{message}}</h1>
    </div>
    {% endif %}

</body>
</html>
